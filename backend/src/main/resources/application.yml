server:
  port: ${PORT:8095}
  tomcat:
    max-http-post-size: 100MB
    max-swallow-size: 100MB
  error:
    # Never expose internal exception messages to clients in production
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  profiles:
    active: dev
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
              - openid

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: ${OPENAI_TEMPERATURE:0.7}
          max-tokens: ${OPENAI_MAX_TOKENS:2048}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5180}


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        # Only expose health and info — never metrics/env/beans publicly
        include: health,info
  endpoint:
    health:
      # Do NOT show full health details publicly; use 'when-authorized' for production
      show-details: when-authorized
      show-components: when-authorized

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5180}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:900000}          # 15 minutes
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
  upi-id: ${UPI_ID:abhiiterates@upi}
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

# ── AI Module App Config ──────────────────────────────────────────────────────
ai:
  system-prompt: |
    You are an intelligent AI assistant embedded in AbhiIterates.OS — a productivity
    operating system built exclusively for students. Your role is to help students with:
    - Study planning and time management
    - Concept explanations across all subjects
    - Assignment and project guidance
    - Marketplace advice for campus buying/selling
    - Career and academic advice
    Be concise, supportive, and academically accurate. Format responses using Markdown
    where helpful (lists, code blocks, headers). Never provide harmful or off-topic content.
